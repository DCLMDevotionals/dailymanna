<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DCLM Devotional</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow:hidden;
    position:relative;
    background:#050816;
}

/* Animated Background */
body::before{
    content:"";
    position:fixed;
    inset:-30%;
    background:
        radial-gradient(circle at 20% 20%, rgba(13,110,253,.35), transparent 28%),
        radial-gradient(circle at 80% 25%, rgba(32,201,151,.30), transparent 30%),
        radial-gradient(circle at 75% 85%, rgba(111,66,193,.35), transparent 30%),
        radial-gradient(circle at 20% 80%, rgba(25,135,84,.30), transparent 28%),
        linear-gradient(135deg,#030712,#0b1224,#111827,#030712);
    background-size:200% 200%;
    animation:gradientMove 18s ease-in-out infinite alternate;
    filter:blur(30px);
    z-index:-2;
}

@keyframes gradientMove{
    0%{
        background-position:0% 50%;
        transform:scale(1);
    }
    50%{
        background-position:100% 50%;
        transform:scale(1.08);
    }
    100%{
        background-position:0% 100%;
        transform:scale(1);
    }
}

/* Soft Glow Overlay */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(circle, rgba(255,255,255,.05), transparent 65%);
    animation:pulse 8s ease-in-out infinite;
    z-index:-1;
}

@keyframes pulse{
    0%,100%{
        opacity:.35;
    }
    50%{
        opacity:.75;
    }
}

/* Card */
.container{
    width:100%;
    max-width:700px;
    background:rgba(15,23,42,.78);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:45px 30px;
    text-align:center;
    box-shadow:
        0 20px 60px rgba(0,0,0,.45),
        0 0 30px rgba(13,110,253,.15);
}

h1{
    color:#fff;
    font-size:2.6rem;
    margin-bottom:18px;
}

.welcome{
    color:#e5e7eb;
    font-size:1.15rem;
    margin-bottom:14px;
}

.intro{
    color:#b8c0cc;
    line-height:1.8;
    margin-bottom:35px;
}

/* Buttons */
.buttons{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    text-decoration:none;
    color:#fff;
    padding:18px;
    border-radius:14px;
    font-size:1.1rem;
    font-weight:600;
    transition:.35s;
    border:1px solid rgba(255,255,255,.08);
}

.btn:hover{
    transform:translateY(-4px) scale(1.02);
    filter:brightness(1.08);
}

.manna{
    background:linear-gradient(135deg,#198754,#2ecc71);
    box-shadow:0 12px 28px rgba(25,135,84,.35);
}

.higher{
    background:linear-gradient(135deg,#0d6efd,#4d9dff);
    box-shadow:0 12px 28px rgba(13,110,253,.35);
}

.milk{
    background:linear-gradient(135deg,#fd7e14,#ffb347);
    box-shadow:0 12px 28px rgba(253,126,20,.35);
}

.footer{
    margin-top:35px;
    color:#94a3b8;
    font-size:.95rem;
}

/* Mobile */
@media(max-width:600px){

    .container{
        padding:35px 20px;
    }

    h1{
        font-size:2rem;
    }

    .welcome{
        font-size:1.05rem;
    }

    .intro{
        font-size:.96rem;
    }

    .btn{
        font-size:1rem;
        padding:16px;
    }
}
</style>

</head>
<body>

<div class="container">

    <h1>📖 DCLM Devotional</h1>

    <p class="welcome">
        🙏 Welcome to DCLM Devotionals page.
    </p>

    <p class="intro">
        📚 Access the Deeper Christian Life Ministry devotional guides for adults, youth and children below:
    </p>

    <div class="buttons">

        <a class="btn manna"
        href="https://dclmdevotionals.github.io/dailymanna/web/viewer.html?file=../pdf/DailyManna.pdf">
            📖 Daily Manna
        </a>

        <a class="btn higher"
        href="https://dclmdevotionals.github.io/dailymanna/web/viewer.html?file=../pdf/HigherEveryday.pdf">
            🌅 Higher Everyday
        </a>

        <a class="btn milk"
        href="https://dclmdevotionals.github.io/dailymanna/web/viewer.html?file=../pdf/SincereMilk.pdf">
            🍼 Sincere Milk
        </a>

    </div>

    <div class="footer">
        ✨ Growing daily in God's Word.
    </div>

</div>

</body>
</html>
