<meta property="og:description" content="Daily Manna, Higher Everyday, and Sincere Milk devotional guides.">
<meta property="og:type" content="website">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    overflow-x:hidden;
    position:relative;
    background:#050816;
}

/* Animated Background */
body::before{
    content:"";
    position:fixed;
    inset:-30%;
    background:
        radial-gradient(circle at 20% 20%, rgba(13,110,253,.35), transparent 28%),
        radial-gradient(circle at 80% 25%, rgba(32,201,151,.30), transparent 30%),
        radial-gradient(circle at 75% 85%, rgba(111,66,193,.35), transparent 30%),
        radial-gradient(circle at 20% 80%, rgba(25,135,84,.30), transparent 28%),
        linear-gradient(135deg,#030712,#0b1224,#111827,#030712);
    background-size:200% 200%;
    animation:gradientMove 18s ease-in-out infinite alternate;
    filter:blur(30px);
    z-index:-2;
}

@keyframes gradientMove{
    0%{
        background-position:0% 50%;
        transform:scale(1);
    }
    50%{
        background-position:100% 50%;
        transform:scale(1.08);
    }
    100%{
        background-position:0% 100%;
        transform:scale(1);
    }
}

/* Soft Glow Overlay */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(circle, rgba(255,255,255,.05), transparent 65%);
    animation:pulse 8s ease-in-out infinite;
    z-index:-1;
}

@keyframes pulse{
    0%,100%{ opacity:.35; }
    50%{ opacity:.75; }
}

/* Card Container */
.container{
    width:100%;
    max-width:700px;
    background:rgba(15,23,42,.78);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:45px 30px;
    text-align:center;
    box-shadow:
        0 20px 60px rgba(0,0,0,.45),
        0 0 30px rgba(13,110,253,.15);
}

h1{
    color:#fff;
    font-size:3rem;
    margin-bottom:18px; 
    letter-spacing: 1px;
}

.welcome{
    color:#c8c8c8;
    font-size:1.5rem;
    margin-bottom:15px;
    font-weight: bold;
}

.intro{
    color: #c8c8c8;
    line-height:1.8;
    margin-bottom:35px;
    font-size: 1.2rem;
    font-weight: 500;
}

/* Primary Buttons */
.buttons{
    display:flex;
    flex-direction:column;
    gap:18px;
    margin-bottom: 35px;
}

.btn{
    display:inline-flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    text-decoration:none;
    color:#fff;
    padding:18px;
    border-radius:14px;
    font-size:1.3rem;
    font-weight:600;
    transition:.35s;
    border:1px solid rgba(255,255,255,.08);
}

/* SVG Icon Styling */
.btn svg {
    width: 24px;
    height: 24px;
    fill: currentColor;
    flex-shrink: 0;
}

.btn:hover{
    transform:translateY(-4px) scale(1.02);
    filter:brightness(1.08);
}

.btn:focus-visible {
    outline: 2px solid #38bdf8;
    outline-offset: 3px;
}

.manna{
    background:linear-gradient(135deg,#0f452b,#07351a);
    box-shadow:0 6px 0px rgba(25,135,84,.35);
}

.higher{
    background:linear-gradient(135deg,#0e2e5f,#052245);
    box-shadow:0 6px 0px rgba(13,110,253,.35);
}

.milk{
    background:linear-gradient(135deg,#5c3a1f,#35230a);
    box-shadow:0 6px 0px rgba(253,126,20,.35);
}

/* Social Section Divider */
.social-divider {
    display: flex;
    align-items: center;
    text-align: center;
    color: #94a3b8;
    font-size: 1rem;
    font-weight: 600;
    margin-top: 50px;
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
}

.social-divider::before,
.social-divider::after {
    content: '';
    flex: 1;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.social-divider:not(:empty)::before { margin-right: .8em; }
.social-divider:not(:empty)::after { margin-left: .8em; }

/* Social Buttons */
.social-buttons {
    display: flex;
    gap: 15px;
    justify-content: center;
}

.social-buttons .btn {
    flex: 1;
    font-size: 1.1rem;
    padding: 14px;
}

.whatsapp {
    background: linear-gradient(135deg, #128c7e, #075e54);
    box-shadow: 0 6px 0px rgba(37, 211, 102, 0.25);
}

.facebook {
    background: linear-gradient(135deg, #1877f2, #0b56ba);
    box-shadow: 0 6px 0px rgba(24, 119, 242, 0.25);
}

.footer{
    margin-top:35px;
    color:#94a3b8;
    font-size:.95rem;
}

/* Mobile Responsiveness */
@media(max-width:600px){
    .container{
        padding:35px 20px;
    }

    h1{
        font-size:2rem;
    }

    .welcome{
        font-size:1.15rem;
    }

    .intro{
        font-size:1rem;
    }

    .btn{
        font-size:1.2rem;
        padding:16px;
    }

    .social-buttons {
        flex-direction: column;
    }
}
</style>
</head>
